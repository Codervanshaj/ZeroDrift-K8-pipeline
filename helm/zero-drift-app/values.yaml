# ── Image ─────────────────────────────────────────────────────────────────────
image:
  repository: your-dockerhub-username/zero-drift-app   # CHANGE: your Docker Hub username
  pullPolicy: IfNotPresent
  # GitHub Actions CI will automatically update this tag on every commit
  tag: "latest"

# ── Replica count ─────────────────────────────────────────────────────────────
replicaCount: 2

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# ── Resource limits ───────────────────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

# ── Environment variables passed to the container ────────────────────────────
env:
  APP_VERSION: "v1.0.0"

# ── Liveness / Readiness probes ───────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
