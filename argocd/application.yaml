apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zero-drift-app
  namespace: argocd
  # Automatically delete all child resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source: Git repo containing the Helm chart 
  source:
    repoURL: https://github.com/Codervanshaj/ZeroDrift-K8-Pipeline.git 
    targetRevision: main
    path: helm/zero-drift-app

  # Destination: Kubernetes cluster & namespace 
  destination:
    server: https://kubernetes.default.svc
    namespace: zero-drift

  # Sync policy: auto-sync = zero-drift guarantee
  syncPolicy:
    automated:
      prune: true       # Remove resources deleted from Git
      selfHeal: true    # Revert any manual changes made directly in the cluster
    syncOptions:
      - CreateNamespace=true   # Create namespace if it doesn't exist
