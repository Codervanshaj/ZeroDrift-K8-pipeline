name: CI Build, Tag & Push Docker Image

# Trigger on every push to main branch
on:
  push:
    branches: [main]

env:
  # Change to your Docker Hub username or GHCR org
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zero-drift-app

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set image tag to short commit SHA ─────────────────────────────────
      - name: Set image tag
        id: vars
        run: echo "TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── 3. Log in to Docker Hub ──────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Set up Docker Buildx (for multi-platform builds if needed) ────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build and push image (tagged with commit SHA + latest) ───────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Update Helm values.yaml with new image tag ────────────────────────
      #       ArgoCD will detect this Git change and auto-sync the cluster.
      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: \"${{ steps.vars.outputs.TAG }}\"|" helm/zero-drift-app/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/zero-drift-app/values.yaml
          git commit -m "ci: update image tag to ${{ steps.vars.outputs.TAG }}"
          git push
